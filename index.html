<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oferta Especial | Reus Clinic</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #cba876; /* Tonalidad clínica/estética */
            --primary-light: #fbeeb8;
            --primary-dark: #b5952f;
            --bg-color: #fafafa;
            --surface: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border: #eaeaea;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(203, 168, 118, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(203, 168, 118, 0.05), transparent 25%);
        }

        .container {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            background: var(--surface);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }

        /* Lado Izquierdo - Imagen de la Clínica */
        .clinic-image {
            width: 100%;
            height: 100%;
            min-height: 400px;
            background-image: url('https://images.unsplash.com/photo-1629909613654-28e377c37b09?q=80&w=2068&auto=format&fit=crop'); /* Placeholder estético de clínica */
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .clinic-image::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.5));
        }
        
        .brand-overlay {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 2;
            color: white;
        }

        .brand-overlay h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        /* Lado Derecho - Formulario */
        .form-card {
            padding: 4rem 3rem;
            position: relative;
        }

        .form-header {
            margin-bottom: 2rem;
        }

        .form-header h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .form-header p {
            color: var(--text-muted);
            font-weight: 400;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 1rem 1.2rem;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23333%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat, repeat;
            background-position: right .7em top 50%, 0 0;
            background-size: .65em auto, 100%;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(203, 168, 118, 0.15);
            background: #fff;
        }

        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            background: var(--primary-dark);
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        .test-config {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px dashed #ddd;
        }
        .test-config input {
            font-size: 0.8rem;
            padding: 0.8rem;
        }

        /* Capa de Éxito */
        .success-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 10;
        }
        .success-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .success-icon {
            width: 80px; height: 80px;
            background: rgba(203, 168, 118, 0.1);
            color: var(--primary);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Imagen Hero -->
        <div class="clinic-image">
            <div class="brand-overlay">
                <!-- Se podría poner el logo con un <img src="https://reusclinic.cat/wp-content/uploads/logo.png">, pero por si su URL cambia ponemos texto -->
                <h1>Reus Clinic</h1>
                <p>Medicina Estética Integrativa</p>
            </div>
        </div>

        <!-- Formulario Adaptado -->
        <div class="form-card">
            <div id="formContent">
                <div class="form-header">
                    <h2>Tu Valoración Gratuita</h2>
                    <p>Déjanos tus datos y nos pondremos en contacto contigo de inmediato para asesorarte.</p>
                </div>

                <form id="leadForm">
                    <div class="form-group">
                        <label>¿Cómo te llamas?</label>
                        <input type="text" id="name" class="form-control" placeholder="Ej: Laura López" required>
                    </div>

                    <div class="form-group">
                        <label>¿Qué te gustaría mejorar?</label>
                        <select id="treatment" class="form-control" required>
                            <option value="" disabled selected>Selecciona una opción...</option>
                            <option value="Arrugas y líneas de expresión">Arrugas y líneas de expresión</option>
                            <option value="Flacidez">Flacidez</option>
                            <option value="Otros / Aún no lo tengo claro">Otros / Aún no lo tengo claro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Número de teléfono (WhatsApp)</label>
                        <input type="tel" id="phone" class="form-control" placeholder="+34 600 000 000" required>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">Sí, quiero mi valoración →</button>
                </form>
            </div>

            <!-- Éxito -->
            <div class="success-overlay" id="successScreen">
                <div class="success-icon">
                    <svg width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2>¡Todo listo!</h2>
                <p style="color: var(--text-muted); margin-top: 1rem;">
                    Hemos recibido tu solicitud.<br>Revisa tu WhatsApp, te acabamos de escribir para agendar tu cita.
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = 'Procesando...';
            btn.style.opacity = '0.7';

            // Recogemos la data adaptada y la unificamos en el payload para el webhook
            const payload = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                treatment: document.getElementById('treatment').value,
                source: "Meta Ads Reus Clinic"
            };

            // URL del Webhook de WF1 en n8n
            const webhookLocation = "http://localhost:5678/webhook-test/coco-bienvenida";

            try {
                const rawResponse = await fetch(webhookLocation, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                document.getElementById('successScreen').classList.add('active');

            } catch (error) {
                alert('💥 Error al disparar el webhook: ' + error.message + '\n\nRevisa que n8n esté ejecutando la URL.');
                btn.innerHTML = 'Sí, quiero mi valoración →';
                btn.style.opacity = '1';
            }
        });
    </script>
</body>
</html>
